services:
  # Backend API Service
  - type: web
    name: document-ai-backend
    runtime: python
    pythonVersion: 3.11
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      pip install gunicorn
    startCommand: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: ANTHROPIC_API_KEY
        sync: false

  # Frontend React Service
  - type: web
    name: document-ai-frontend
    runtime: node
    buildCommand: |
      cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        value: https://document-ai-backend.onrender.com
