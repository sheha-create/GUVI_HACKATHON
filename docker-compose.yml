services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guvi-backend
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: guvi-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped
